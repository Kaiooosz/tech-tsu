<svg xmlns="http://www.w3.org/2000/svg" width="720" height="540" viewBox="0 0 720 540">
  <defs>
    <style>text { font-family: 'Space Grotesk', -apple-system, 'Helvetica Neue', sans-serif; }</style>
  </defs>

  <rect width="720" height="540" fill="#0d0e11"/>

  <!-- Window -->
  <rect x="20" y="20" width="680" height="490" rx="10" fill="#161b22" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Title bar -->
  <rect x="20" y="20" width="680" height="36" rx="10" fill="#1e2228"/>
  <rect x="20" y="44" width="680" height="12" fill="#1e2228"/>
  <circle cx="44" cy="38" r="6" fill="#ff5f57"/>
  <circle cx="62" cy="38" r="6" fill="#ffbd2e"/>
  <circle cx="80" cy="38" r="6" fill="#27c93f"/>
  <text x="360" y="44" font-size="12" fill="rgba(255,255,255,0.5)" text-anchor="middle">Agenda — Abril 2024</text>

  <!-- Month header -->
  <rect x="20" y="56" width="680" height="50" fill="#1a1f26"/>
  <text x="360" y="78" font-size="18" fill="rgba(255,255,255,0.8)" font-weight="700" text-anchor="middle">Abril 2024</text>
  <text x="360" y="96" font-size="11" fill="rgba(255,255,255,0.3)" text-anchor="middle">Semana de trabalho · Nenhum compromisso confirmado</text>

  <!-- Days header -->
  <rect x="20" y="106" width="680" height="28" fill="#13171d"/>
  <g fill="rgba(255,255,255,0.3)" font-size="11" font-weight="600">
    <text x="68" y="125" text-anchor="middle">SEG</text>
    <text x="166" y="125" text-anchor="middle">TER</text>
    <text x="264" y="125" text-anchor="middle">QUA</text>
    <text x="362" y="125" text-anchor="middle">QUI</text>
    <text x="460" y="125" text-anchor="middle">SEX</text>
    <text x="558" y="125" text-anchor="middle">SÁB</text>
    <text x="656" y="125" text-anchor="middle">DOM</text>
  </g>

  <!-- Calendar grid lines -->
  <rect x="20" y="134" width="680" height="346" fill="#161b22"/>
  <!-- Vertical lines -->
  <line x1="118" y1="134" x2="118" y2="480" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="216" y1="134" x2="216" y2="480" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="314" y1="134" x2="314" y2="480" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="412" y1="134" x2="412" y2="480" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="510" y1="134" x2="510" y2="480" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="608" y1="134" x2="608" y2="480" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <!-- Horizontal lines -->
  <line x1="20" y1="250" x2="700" y2="250" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="20" y1="366" x2="700" y2="366" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Day numbers -->
  <g font-size="13" font-weight="600">
    <!-- Week 1 -->
    <text x="68" y="154" text-anchor="middle" fill="rgba(255,255,255,0.5)">1</text>
    <text x="166" y="154" text-anchor="middle" fill="rgba(255,255,255,0.5)">2</text>
    <text x="264" y="154" text-anchor="middle" fill="rgba(255,255,255,0.5)">3</text>
    <text x="362" y="154" text-anchor="middle" fill="rgba(255,255,255,0.5)">4</text>
    <text x="460" y="154" text-anchor="middle" fill="rgba(255,255,255,0.5)">5</text>
    <text x="558" y="154" text-anchor="middle" fill="rgba(255,255,255,0.2)">6</text>
    <text x="656" y="154" text-anchor="middle" fill="rgba(255,255,255,0.2)">7</text>
    <!-- Week 2 -->
    <text x="68" y="270" text-anchor="middle" fill="rgba(255,255,255,0.5)">8</text>
    <text x="166" y="270" text-anchor="middle" fill="rgba(255,255,255,0.5)">9</text>
    <text x="264" y="270" text-anchor="middle" fill="rgba(255,255,255,0.5)">10</text>
    <text x="362" y="270" text-anchor="middle" fill="rgba(255,255,255,0.5)">11</text>
    <text x="460" y="270" text-anchor="middle" fill="rgba(255,255,255,0.5)">12</text>
    <text x="558" y="270" text-anchor="middle" fill="rgba(255,255,255,0.2)">13</text>
    <text x="656" y="270" text-anchor="middle" fill="rgba(255,255,255,0.2)">14</text>
    <!-- Week 3 -->
    <text x="68" y="386" text-anchor="middle" fill="rgba(255,255,255,0.5)">15</text>
    <text x="166" y="386" text-anchor="middle" fill="rgba(255,255,255,0.5)">16</text>
    <text x="264" y="386" text-anchor="middle" fill="rgba(255,255,255,0.5)">17</text>
    <text x="362" y="386" text-anchor="middle" fill="rgba(255,255,255,0.5)">18</text>
    <text x="460" y="386" text-anchor="middle" fill="rgba(255,255,255,0.5)">19</text>
    <text x="558" y="386" text-anchor="middle" fill="rgba(255,255,255,0.2)">20</text>
    <text x="656" y="386" text-anchor="middle" fill="rgba(255,255,255,0.2)">21</text>
  </g>

  <!-- Empty state slots (blank areas with dash) -->
  <g opacity="0.15">
    <rect x="30" y="162" width="78" height="78" rx="4" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1" stroke-dasharray="4 4"/>
    <rect x="128" y="162" width="78" height="78" rx="4" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1" stroke-dasharray="4 4"/>
    <rect x="226" y="162" width="78" height="78" rx="4" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1" stroke-dasharray="4 4"/>
    <rect x="422" y="162" width="78" height="78" rx="4" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1" stroke-dasharray="4 4"/>
    <rect x="30" y="278" width="78" height="78" rx="4" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1" stroke-dasharray="4 4"/>
    <rect x="226" y="278" width="78" height="78" rx="4" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1" stroke-dasharray="4 4"/>
    <rect x="324" y="278" width="78" height="78" rx="4" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1" stroke-dasharray="4 4"/>
    <rect x="422" y="278" width="78" height="78" rx="4" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1" stroke-dasharray="4 4"/>
  </g>

  <!-- Problematic events -->
  <!-- Reunião sem horário -->
  <rect x="324" y="166" width="80" height="30" rx="4" fill="rgba(255,150,50,0.12)" stroke="rgba(255,150,50,0.3)" stroke-width="1"/>
  <text x="332" y="180" font-size="9" fill="rgba(255,180,80,0.9)" font-weight="600">Reunião cliente</text>
  <text x="332" y="191" font-size="8.5" fill="rgba(255,150,50,0.6)">horário: ???</text>

  <!-- Consulta cancelada -->
  <rect x="128" y="282" width="80" height="30" rx="4" fill="rgba(255,50,50,0.1)" stroke="rgba(255,50,50,0.25)" stroke-width="1"/>
  <text x="136" y="296" font-size="9" fill="rgba(255,100,100,0.8)" font-weight="600" text-decoration="line-through">Consulta 14h</text>
  <text x="136" y="307" font-size="8" fill="rgba(255,80,80,0.6)">CANCELADO</text>

  <!-- Follow-up sem data -->
  <rect x="520" y="166" width="80" height="30" rx="4" fill="rgba(255,255,100,0.08)" stroke="rgba(255,255,80,0.2)" stroke-width="1"/>
  <text x="528" y="180" font-size="9" fill="rgba(255,230,100,0.7)" font-weight="600">Follow-up</text>
  <text x="528" y="191" font-size="8.5" fill="rgba(255,200,80,0.5)">algum dia?</text>

  <!-- Pendente -->
  <rect x="520" y="282" width="80" height="30" rx="4" fill="rgba(255,50,50,0.1)" stroke="rgba(255,50,50,0.25)" stroke-width="1"/>
  <text x="528" y="296" font-size="9" fill="rgba(255,100,100,0.8)" font-weight="600">Proposta</text>
  <text x="528" y="307" font-size="8.5" fill="rgba(255,80,80,0.6)">não enviada (!)</text>

  <!-- Central empty message -->
  <text x="362" y="430" font-size="13" fill="rgba(255,255,255,0.12)" text-anchor="middle" font-weight="600">Semana quase vazia.</text>
  <text x="362" y="448" font-size="11" fill="rgba(255,255,255,0.08)" text-anchor="middle">Nenhum acompanhamento ativo.</text>

  <!-- Alert bottom -->
  <rect x="20" y="456" width="680" height="44" fill="rgba(255,40,40,0.05)" stroke="none"/>
  <rect x="20" y="456" width="680" height="1" fill="rgba(255,60,60,0.1)"/>
  <circle cx="52" cy="478" r="10" fill="rgba(255,60,60,0.12)" stroke="rgba(255,60,60,0.25)" stroke-width="1"/>
  <text x="52" y="483" font-size="12" fill="#ff6666" text-anchor="middle" font-weight="700">!</text>
  <text x="72" y="474" font-size="11" fill="rgba(255,100,100,0.7)" font-weight="600">8 leads na semana — nenhum com próximo passo definido</text>
  <text x="72" y="490" font-size="10" fill="rgba(255,255,255,0.25)">Sem CRM integrado, follow-up depende de memória</text>
</svg>
