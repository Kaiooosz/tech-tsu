<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240" viewBox="0 0 240 240">
  <defs>
    <pattern id="circuit" x="0" y="0" width="240" height="240" patternUnits="userSpaceOnUse">

      <!-- ── Traces horizontais ── -->
      <g stroke="rgba(46,196,182,0.10)" stroke-width="1" fill="none" stroke-linecap="square">
        <line x1="0"   y1="40"  x2="50"  y2="40"/>
        <line x1="70"  y1="40"  x2="130" y2="40"/>
        <line x1="150" y1="40"  x2="240" y2="40"/>
        <line x1="0"   y1="120" x2="50"  y2="120"/>
        <line x1="70"  y1="120" x2="170" y2="120"/>
        <line x1="190" y1="120" x2="240" y2="120"/>
        <line x1="0"   y1="200" x2="110" y2="200"/>
        <line x1="130" y1="200" x2="240" y2="200"/>

        <!-- ── Traces verticais ── -->
        <line x1="60"  y1="0"   x2="60"  y2="40"/>
        <line x1="60"  y1="80"  x2="60"  y2="120"/>
        <line x1="60"  y1="160" x2="60"  y2="240"/>
        <line x1="140" y1="0"   x2="140" y2="40"/>
        <line x1="140" y1="80"  x2="140" y2="120"/>
        <line x1="140" y1="160" x2="140" y2="200"/>
        <line x1="200" y1="0"   x2="200" y2="40"/>
        <line x1="200" y1="80"  x2="200" y2="120"/>
        <line x1="200" y1="160" x2="200" y2="240"/>
        <line x1="20"  y1="120" x2="20"  y2="240"/>

        <!-- ── Segmentos em L (roteamento real) ── -->
        <path d="M50,40  V80  H70"/>
        <path d="M50,120 V80  H70"/>
        <path d="M170,120 V160 H200"/>
        <path d="M110,200 V160 H140"/>
        <path d="M20,120  V160 H60"/>
      </g>

      <!-- ── Vias (furos de interligação) ── -->
      <g fill="rgba(7,8,9,1)" stroke="rgba(46,196,182,0.22)" stroke-width="1">
        <circle cx="60"  cy="40"  r="4.5"/>
        <circle cx="140" cy="40"  r="4.5"/>
        <circle cx="200" cy="40"  r="4.5"/>
        <circle cx="60"  cy="120" r="4.5"/>
        <circle cx="140" cy="120" r="4.5"/>
        <circle cx="200" cy="120" r="4.5"/>
        <circle cx="60"  cy="200" r="3.5"/>
        <circle cx="140" cy="200" r="3.5"/>
        <circle cx="20"  cy="200" r="3"/>
      </g>

      <!-- ── Ponto central dos vias ── -->
      <g fill="rgba(46,196,182,0.18)">
        <circle cx="60"  cy="40"  r="1.5"/>
        <circle cx="140" cy="40"  r="1.5"/>
        <circle cx="200" cy="40"  r="1.5"/>
        <circle cx="60"  cy="120" r="1.5"/>
        <circle cx="140" cy="120" r="1.5"/>
        <circle cx="200" cy="120" r="1.5"/>
        <circle cx="60"  cy="200" r="1.2"/>
        <circle cx="140" cy="200" r="1.2"/>
      </g>

      <!-- ── Pads de componente (SMD) ── -->
      <g fill="none" stroke="rgba(46,196,182,0.09)" stroke-width="0.75">
        <rect x="46"  y="26"  width="28" height="28" rx="2"/>
        <rect x="126" y="26"  width="28" height="28" rx="2"/>
        <rect x="46"  y="106" width="28" height="28" rx="2"/>
        <rect x="186" y="106" width="28" height="28" rx="2"/>
      </g>

      <!-- ── Plano de terra (canto) ── -->
      <path d="M0,0 H30 V30 H0 Z" fill="rgba(46,196,182,0.03)" stroke="rgba(46,196,182,0.08)" stroke-width="0.5"/>
      <path d="M210,210 H240 V240 H210 Z" fill="rgba(46,196,182,0.03)" stroke="rgba(46,196,182,0.08)" stroke-width="0.5"/>

    </pattern>
  </defs>
  <rect width="240" height="240" fill="url(#circuit)"/>
</svg>
