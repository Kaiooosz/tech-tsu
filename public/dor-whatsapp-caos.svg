<svg xmlns="http://www.w3.org/2000/svg" width="720" height="540" viewBox="0 0 720 540">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&amp;display=swap');
      text { font-family: 'Space Grotesk', -apple-system, 'Helvetica Neue', sans-serif; }
    </style>
    <clipPath id="phone"><rect x="220" y="10" width="280" height="520" rx="30"/></clipPath>
    <filter id="shadow"><feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#000" flood-opacity="0.6"/></filter>
  </defs>

  <!-- Background -->
  <rect width="720" height="540" fill="#0d0e11"/>

  <!-- Ambient glow -->
  <ellipse cx="360" cy="270" rx="320" ry="220" fill="none" stroke="rgba(255,50,50,0.04)" stroke-width="80"/>

  <!-- Phone body -->
  <rect x="220" y="10" width="280" height="520" rx="30" fill="#1a1a1a" filter="url(#shadow)"/>
  <rect x="222" y="12" width="276" height="516" rx="29" fill="#111"/>

  <!-- Status bar -->
  <rect x="222" y="12" width="276" height="36" rx="0" fill="#111"/>
  <text x="240" y="32" font-size="11" fill="rgba(255,255,255,0.6)" font-weight="600">9:41</text>
  <text x="456" y="32" font-size="11" fill="rgba(255,255,255,0.5)" text-anchor="end">●●●●  WiFi  100%</text>

  <!-- Notch -->
  <rect x="320" y="14" width="80" height="22" rx="11" fill="#0a0a0a"/>

  <!-- WhatsApp header -->
  <rect x="222" y="48" width="276" height="52" fill="#1a2e1a"/>
  <circle cx="250" cy="74" r="16" fill="rgba(255,255,255,0.08)"/>
  <text x="250" y="79" font-size="12" fill="rgba(255,255,255,0.7)" text-anchor="middle" font-weight="700">G</text>
  <text x="275" y="68" font-size="12" fill="#fff" font-weight="700">Grupo Operação Geral</text>
  <text x="275" y="83" font-size="10" fill="rgba(255,255,255,0.45)">Ana, Carlos, Dr. Marcus +4</text>
  <!-- Badge de não lidas -->
  <circle cx="482" cy="66" r="11" fill="#ff3333"/>
  <text x="482" y="71" font-size="10" fill="#fff" text-anchor="middle" font-weight="700">47</text>

  <!-- Mensagens -->
  <!-- Msg 1 -->
  <rect x="232" y="112" width="200" height="48" rx="8" fill="#1e2b1e"/>
  <rect x="232" y="112" width="4" height="48" rx="2" fill="#25d366"/>
  <text x="244" y="127" font-size="10" fill="#25d366" font-weight="600">Dr. Marcus</text>
  <text x="244" y="141" font-size="10.5" fill="rgba(255,255,255,0.75)">Onde ficou o contrato</text>
  <text x="244" y="154" font-size="10.5" fill="rgba(255,255,255,0.75)">do cliente Silva??</text>
  <text x="424" y="154" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="end">09:12 ✓</text>

  <!-- Msg 2 - alerta -->
  <rect x="232" y="170" width="215" height="42" rx="8" fill="rgba(255,40,40,0.12)"/>
  <rect x="232" y="170" width="4" height="42" rx="2" fill="#ff4444"/>
  <text x="244" y="185" font-size="10" fill="#ff6666" font-weight="600">Dr. Marcus</text>
  <text x="244" y="199" font-size="11" fill="rgba(255,130,130,0.9)" font-weight="600">PRAZO VENCEU ONTEM!!</text>
  <text x="439" y="205" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="end">09:31 ✓✓</text>

  <!-- Msg 3 -->
  <rect x="232" y="222" width="188" height="42" rx="8" fill="#1e2b1e"/>
  <text x="244" y="237" font-size="10" fill="#aed6a0" font-weight="600">Carlos</text>
  <text x="244" y="251" font-size="10.5" fill="rgba(255,255,255,0.65)">Qual planilha é a certa?</text>
  <text x="244" y="258" font-size="10.5" fill="rgba(255,255,255,0.65)">tem 3 versões no drive</text>
  <text x="412" y="258" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="end">10:05 ✓</text>

  <!-- Msg 4 enviada -->
  <rect x="302" y="274" width="186" height="36" rx="8" fill="#005c4b"/>
  <text x="314" y="289" font-size="10.5" fill="rgba(255,255,255,0.75)">Não sei, perguntar pra</text>
  <text x="314" y="303" font-size="10.5" fill="rgba(255,255,255,0.75)">Lúcia</text>
  <text x="480" y="303" font-size="9" fill="rgba(255,255,255,0.4)" text-anchor="end">10:07 ✓✓</text>

  <!-- Msg 5 - alerta vermelho forte -->
  <rect x="232" y="320" width="225" height="54" rx="8" fill="rgba(255,30,30,0.15)"/>
  <rect x="232" y="320" width="4" height="54" rx="2" fill="#ff2222"/>
  <text x="244" y="336" font-size="10" fill="#ff6666" font-weight="700">Lúcia</text>
  <text x="244" y="351" font-size="11" fill="rgba(255,110,110,0.95)" font-weight="600">A planilha travou DE</text>
  <text x="244" y="365" font-size="11" fill="rgba(255,110,110,0.95)" font-weight="600">NOVO — de novo!</text>
  <text x="449" y="368" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="end">12:03 ✓</text>

  <!-- Msg 6 -->
  <rect x="232" y="385" width="196" height="42" rx="8" fill="#1e2b1e"/>
  <text x="244" y="400" font-size="10" fill="#25d366" font-weight="600">Dr. Marcus</text>
  <text x="244" y="414" font-size="10.5" fill="rgba(255,255,255,0.65)">Quantos clientes ativos</text>
  <text x="244" y="427" font-size="10.5" fill="rgba(255,255,255,0.65)">temos esse mês???</text>
  <text x="420" y="422" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="end">11:40 ✓</text>

  <!-- Input bar -->
  <rect x="222" y="438" width="276" height="48" fill="#1a1a1a"/>
  <rect x="232" y="448" width="196" height="28" rx="14" fill="#2a2a2a"/>
  <text x="246" y="466" font-size="10" fill="rgba(255,255,255,0.25)">Mensagem</text>
  <circle cx="446" cy="462" r="13" fill="#25d366"/>
  <text x="446" y="467" font-size="12" fill="#fff" text-anchor="middle">➤</text>

  <!-- iPhone home indicator -->
  <rect x="330" y="494" width="60" height="4" rx="2" fill="rgba(255,255,255,0.25)"/>

  <!-- Side label -->
  <text x="32" y="240" font-size="11" fill="rgba(255,60,60,0.7)" font-weight="600" letter-spacing="2" text-anchor="middle" transform="rotate(-90,32,240)">SEM SISTEMA</text>
  <rect x="20" y="120" width="3" height="240" rx="1.5" fill="rgba(255,60,60,0.25)"/>

  <!-- Right side annotations -->
  <text x="530" y="145" font-size="11" fill="rgba(255,255,255,0.35)" font-style="italic">"Prazo perdido</text>
  <text x="530" y="159" font-size="11" fill="rgba(255,255,255,0.35)" font-style="italic"> por WhatsApp"</text>
  <line x1="432" y1="136" x2="526" y2="142" stroke="rgba(255,60,60,0.2)" stroke-width="1" stroke-dasharray="4 3"/>

  <text x="530" y="210" font-size="11" fill="rgba(255,255,255,0.35)" font-style="italic">"Ninguém sabe</text>
  <text x="530" y="224" font-size="11" fill="rgba(255,255,255,0.35)" font-style="italic"> a versão certa"</text>
  <line x1="420" y1="234" x2="526" y2="222" stroke="rgba(255,60,60,0.2)" stroke-width="1" stroke-dasharray="4 3"/>

  <text x="530" y="355" font-size="11" fill="rgba(255,255,255,0.35)" font-style="italic">"Planilha travada,</text>
  <text x="530" y="369" font-size="11" fill="rgba(255,255,255,0.35)" font-style="italic"> operação parada"</text>
  <line x1="457" y1="348" x2="526" y2="358" stroke="rgba(255,60,60,0.2)" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- Badge -->
  <rect x="30" y="460" width="170" height="36" rx="6" fill="rgba(255,40,40,0.08)" stroke="rgba(255,60,60,0.15)" stroke-width="1"/>
  <circle cx="48" cy="478" r="5" fill="#ff4444"/>
  <text x="60" y="483" font-size="10" fill="rgba(255,100,100,0.7)" font-weight="600">47 mensagens sem resposta</text>
</svg>
