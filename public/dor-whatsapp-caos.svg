<svg xmlns="http://www.w3.org/2000/svg" width="720" height="540" viewBox="0 0 720 540">
  <defs>
    <style>text { font-family: 'Space Grotesk', -apple-system, 'Helvetica Neue', sans-serif; }</style>
    <clipPath id="phone"><rect x="220" y="10" width="280" height="520" rx="30"/></clipPath>
    <filter id="shadow"><feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#000" flood-opacity="0.5"/></filter>
  </defs>

  <!-- Background -->
  <rect width="720" height="540" fill="#0d0e11"/>

  <!-- Phone body -->
  <rect x="220" y="10" width="280" height="520" rx="30" fill="#1a1a1f" filter="url(#shadow)"/>
  <rect x="222" y="12" width="276" height="516" rx="29" fill="#111115"/>

  <!-- Status bar -->
  <rect x="222" y="12" width="276" height="36" fill="#111115"/>
  <text x="240" y="32" font-size="11" fill="rgba(255,255,255,0.55)" font-weight="600">9:41</text>
  <text x="456" y="32" font-size="11" fill="rgba(255,255,255,0.4)" text-anchor="end">WiFi 100%</text>

  <!-- Notch -->
  <rect x="320" y="14" width="80" height="22" rx="11" fill="#0a0a0e"/>

  <!-- WhatsApp header -->
  <rect x="222" y="48" width="276" height="52" fill="#1c1c22"/>
  <circle cx="250" cy="74" r="16" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="250" y="79" font-size="12" fill="rgba(255,255,255,0.5)" text-anchor="middle" font-weight="700">G</text>
  <text x="275" y="68" font-size="12" fill="rgba(255,255,255,0.85)" font-weight="700">Grupo Operação Geral</text>
  <text x="275" y="83" font-size="10" fill="rgba(255,255,255,0.35)">Ana, Carlos, Dr. Marcus +4</text>

  <!-- Mensagens -->
  <!-- Msg 1 -->
  <rect x="232" y="112" width="200" height="50" rx="8" fill="#1e1e26"/>
  <rect x="232" y="112" width="3" height="50" rx="1.5" fill="rgba(255,255,255,0.18)"/>
  <text x="244" y="127" font-size="10" fill="rgba(255,255,255,0.5)" font-weight="600">Dr. Marcus</text>
  <text x="244" y="142" font-size="10.5" fill="rgba(255,255,255,0.7)">Onde ficou o contrato</text>
  <text x="244" y="155" font-size="10.5" fill="rgba(255,255,255,0.7)">do cliente Silva??</text>
  <text x="424" y="155" font-size="9" fill="rgba(255,255,255,0.25)" text-anchor="end">09:12 ✓</text>

  <!-- Msg 2 - alerta -->
  <rect x="232" y="172" width="215" height="42" rx="8" fill="#252530"/>
  <rect x="232" y="172" width="3" height="42" rx="1.5" fill="rgba(255,255,255,0.35)"/>
  <text x="244" y="187" font-size="10" fill="rgba(255,255,255,0.45)" font-weight="600">Dr. Marcus</text>
  <text x="244" y="204" font-size="11" fill="rgba(255,255,255,0.85)" font-weight="700">PRAZO VENCEU ONTEM!!</text>
  <text x="439" y="207" font-size="9" fill="rgba(255,255,255,0.25)" text-anchor="end">09:31 ✓✓</text>

  <!-- Msg 3 -->
  <rect x="232" y="224" width="188" height="44" rx="8" fill="#1e1e26"/>
  <text x="244" y="239" font-size="10" fill="rgba(255,255,255,0.45)" font-weight="600">Carlos</text>
  <text x="244" y="253" font-size="10.5" fill="rgba(255,255,255,0.65)">Qual planilha é a certa?</text>
  <text x="244" y="261" font-size="10.5" fill="rgba(255,255,255,0.65)">tem 3 versões no drive</text>
  <text x="412" y="261" font-size="9" fill="rgba(255,255,255,0.25)" text-anchor="end">10:05 ✓</text>

  <!-- Msg 4 enviada -->
  <rect x="302" y="278" width="186" height="36" rx="8" fill="#252535"/>
  <text x="314" y="293" font-size="10.5" fill="rgba(255,255,255,0.65)">Não sei, perguntar pra</text>
  <text x="314" y="307" font-size="10.5" fill="rgba(255,255,255,0.65)">Lúcia</text>
  <text x="480" y="307" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="end">10:07 ✓✓</text>

  <!-- Msg 5 - alerta forte -->
  <rect x="232" y="324" width="225" height="54" rx="8" fill="#2a2a38"/>
  <rect x="232" y="324" width="3" height="54" rx="1.5" fill="rgba(255,255,255,0.45)"/>
  <text x="244" y="340" font-size="10" fill="rgba(255,255,255,0.45)" font-weight="700">Lúcia</text>
  <text x="244" y="356" font-size="11" fill="rgba(255,255,255,0.88)" font-weight="600">A planilha travou DE</text>
  <text x="244" y="371" font-size="11" fill="rgba(255,255,255,0.88)" font-weight="600">NOVO — de novo!</text>
  <text x="449" y="371" font-size="9" fill="rgba(255,255,255,0.25)" text-anchor="end">12:03 ✓</text>

  <!-- Msg 6 -->
  <rect x="232" y="388" width="196" height="44" rx="8" fill="#1e1e26"/>
  <text x="244" y="403" font-size="10" fill="rgba(255,255,255,0.45)" font-weight="600">Dr. Marcus</text>
  <text x="244" y="418" font-size="10.5" fill="rgba(255,255,255,0.6)">Quantos clientes ativos</text>
  <text x="244" y="426" font-size="10.5" fill="rgba(255,255,255,0.6)">temos esse mês???</text>
  <text x="420" y="426" font-size="9" fill="rgba(255,255,255,0.25)" text-anchor="end">11:40 ✓</text>

  <!-- Input bar -->
  <rect x="222" y="442" width="276" height="48" fill="#1a1a1f"/>
  <rect x="232" y="452" width="196" height="28" rx="14" fill="#252530"/>
  <text x="246" y="470" font-size="10" fill="rgba(255,255,255,0.2)">Mensagem</text>
  <circle cx="446" cy="466" r="13" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <path d="M441 466l8 0M446 461l5 5-5 5" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- iPhone home indicator -->
  <rect x="330" y="497" width="60" height="4" rx="2" fill="rgba(255,255,255,0.15)"/>

  <!-- Side label -->
  <text x="32" y="240" font-size="11" fill="rgba(255,255,255,0.2)" font-weight="600" letter-spacing="2" text-anchor="middle" transform="rotate(-90,32,240)">SEM SISTEMA</text>
  <rect x="20" y="120" width="2" height="240" rx="1" fill="rgba(255,255,255,0.1)"/>

  <!-- Right side annotations -->
  <text x="530" y="145" font-size="11" fill="rgba(255,255,255,0.3)" font-style="italic">"Prazo perdido</text>
  <text x="530" y="159" font-size="11" fill="rgba(255,255,255,0.3)" font-style="italic"> por WhatsApp"</text>
  <line x1="432" y1="136" x2="526" y2="142" stroke="rgba(255,255,255,0.1)" stroke-width="1" stroke-dasharray="4 3"/>

  <text x="530" y="210" font-size="11" fill="rgba(255,255,255,0.3)" font-style="italic">"Ninguém sabe</text>
  <text x="530" y="224" font-size="11" fill="rgba(255,255,255,0.3)" font-style="italic"> a versão certa"</text>
  <line x1="420" y1="234" x2="526" y2="222" stroke="rgba(255,255,255,0.1)" stroke-width="1" stroke-dasharray="4 3"/>

  <text x="530" y="355" font-size="11" fill="rgba(255,255,255,0.3)" font-style="italic">"Planilha travada,</text>
  <text x="530" y="369" font-size="11" fill="rgba(255,255,255,0.3)" font-style="italic"> operação parada"</text>
  <line x1="457" y1="348" x2="526" y2="358" stroke="rgba(255,255,255,0.1)" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- Badge bottom -->
  <rect x="30" y="462" width="172" height="34" rx="6" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <rect x="42" y="474" width="6" height="6" rx="1" fill="rgba(255,255,255,0.25)"/>
  <text x="56" y="483" font-size="10" fill="rgba(255,255,255,0.4)" font-weight="600">47 mensagens sem resposta</text>
</svg>
