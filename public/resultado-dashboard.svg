<svg xmlns="http://www.w3.org/2000/svg" width="720" height="540" viewBox="0 0 720 540">
  <defs>
    <style>text { font-family: 'Space Grotesk', -apple-system, 'Helvetica Neue', sans-serif; }</style>
    <linearGradient id="bar-teal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2C55E8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#2C55E8" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="bar-dim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.04)"/>
    </linearGradient>
  </defs>

  <rect width="720" height="540" fill="#0d0e11"/>

  <!-- Window -->
  <rect x="20" y="20" width="680" height="500" rx="10" fill="#161b22" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Title bar -->
  <rect x="20" y="20" width="680" height="36" rx="10" fill="#1e2228"/>
  <rect x="20" y="44" width="680" height="12" fill="#1e2228"/>
  <circle cx="44" cy="38" r="6" fill="#ff5f57"/>
  <circle cx="62" cy="38" r="6" fill="#ffbd2e"/>
  <circle cx="80" cy="38" r="6" fill="#27c93f"/>
  <text x="360" y="44" font-size="12" fill="rgba(255,255,255,0.4)" text-anchor="middle">dashboard.techtsu.app — Bom dia, Dr. Marcos</text>

  <!-- Sidebar -->
  <rect x="20" y="56" width="130" height="464" fill="#13171d"/>
  <rect x="150" y="56" width="1" height="464" fill="rgba(255,255,255,0.05)"/>

  <!-- Sidebar items -->
  <rect x="28" y="72" width="114" height="28" rx="4" fill="rgba(44,85,232,0.12)"/>
  <text x="42" y="91" font-size="11" fill="#2C55E8" font-weight="700">Dashboard</text>

  <text x="42" y="120" font-size="11" fill="rgba(255,255,255,0.3)">Clientes</text>
  <text x="42" y="144" font-size="11" fill="rgba(255,255,255,0.3)">Pipeline</text>
  <text x="42" y="168" font-size="11" fill="rgba(255,255,255,0.3)">Tarefas</text>
  <text x="42" y="192" font-size="11" fill="rgba(255,255,255,0.3)">Documentos</text>
  <text x="42" y="216" font-size="11" fill="rgba(255,255,255,0.3)">Agenda</text>
  <text x="42" y="240" font-size="11" fill="rgba(255,255,255,0.3)">Propostas</text>
  <text x="42" y="264" font-size="11" fill="rgba(255,255,255,0.3)">Relatórios</text>

  <!-- Notification badge -->
  <circle cx="128" cy="165" r="8" fill="rgba(44,85,232,0.9)"/>
  <text x="128" y="169" font-size="8" fill="#fff" text-anchor="middle" font-weight="700">3</text>

  <!-- Main area -->
  <!-- Header greeting -->
  <text x="168" y="84" font-size="14" fill="rgba(255,255,255,0.85)" font-weight="700">Bom dia, Dr. Marcos</text>
  <text x="168" y="100" font-size="10" fill="rgba(255,255,255,0.3)" font-family="monospace">Seg, 19 Mai 2025 · 3 tarefas para hoje</text>

  <!-- KPI cards row -->
  <!-- Card 1: Clientes -->
  <rect x="168" y="114" width="120" height="72" rx="6" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="180" y="134" font-size="10" fill="rgba(255,255,255,0.3)" font-weight="500">Clientes ativos</text>
  <text x="180" y="160" font-size="26" fill="rgba(255,255,255,0.9)" font-weight="700">24</text>
  <text x="260" y="178" font-size="9" fill="#2C55E8" text-anchor="end">+3 este mês</text>

  <!-- Card 2: OS abertas -->
  <rect x="298" y="114" width="120" height="72" rx="6" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="310" y="134" font-size="10" fill="rgba(255,255,255,0.3)" font-weight="500">OS abertas</text>
  <text x="310" y="160" font-size="26" fill="rgba(255,255,255,0.9)" font-weight="700">7</text>
  <text x="390" y="178" font-size="9" fill="#f6c85f" text-anchor="end">2 vencem hoje</text>

  <!-- Card 3: MRR -->
  <rect x="428" y="114" width="120" height="72" rx="6" fill="rgba(44,85,232,0.06)" stroke="rgba(44,85,232,0.2)" stroke-width="1"/>
  <text x="440" y="134" font-size="10" fill="rgba(255,255,255,0.3)" font-weight="500">MRR</text>
  <text x="440" y="160" font-size="22" fill="rgba(255,255,255,0.9)" font-weight="700">R$41k</text>
  <text x="520" y="178" font-size="9" fill="#2C55E8" text-anchor="end">+12% vs mês ant.</text>

  <!-- Card 4: Taxa Fechamento -->
  <rect x="558" y="114" width="126" height="72" rx="6" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="570" y="134" font-size="10" fill="rgba(255,255,255,0.3)" font-weight="500">Taxa fechamento</text>
  <text x="570" y="160" font-size="26" fill="rgba(255,255,255,0.9)" font-weight="700">68%</text>
  <text x="676" y="178" font-size="9" fill="#2C55E8" text-anchor="end">acima da meta</text>

  <!-- Chart area -->
  <rect x="168" y="202" width="320" height="170" rx="6" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="180" y="220" font-size="9" fill="rgba(255,255,255,0.3)" font-weight="600" letter-spacing="1">RECEITA — ÚLTIMOS 6 MESES</text>

  <!-- Bar chart -->
  <g transform="translate(185, 230)">
    <!-- Bars -->
    <rect x="0"   y="72" width="32" height="58" rx="2" fill="url(#bar-dim)"/>
    <rect x="48"  y="60" width="32" height="70" rx="2" fill="url(#bar-dim)"/>
    <rect x="96"  y="50" width="32" height="80" rx="2" fill="url(#bar-dim)"/>
    <rect x="144" y="40" width="32" height="90" rx="2" fill="url(#bar-dim)"/>
    <rect x="192" y="28" width="32" height="102" rx="2" fill="url(#bar-dim)"/>
    <rect x="240" y="10" width="32" height="120" rx="2" fill="url(#bar-teal)"/>
    <!-- Labels -->
    <text x="16"  y="140" font-size="8" fill="rgba(255,255,255,0.25)" text-anchor="middle">Dez</text>
    <text x="64"  y="140" font-size="8" fill="rgba(255,255,255,0.25)" text-anchor="middle">Jan</text>
    <text x="112" y="140" font-size="8" fill="rgba(255,255,255,0.25)" text-anchor="middle">Fev</text>
    <text x="160" y="140" font-size="8" fill="rgba(255,255,255,0.25)" text-anchor="middle">Mar</text>
    <text x="208" y="140" font-size="8" fill="rgba(255,255,255,0.25)" text-anchor="middle">Abr</text>
    <text x="256" y="140" font-size="8" fill="#2C55E8" text-anchor="middle">Mai</text>
    <!-- Values top -->
    <text x="256" y="6" font-size="9" fill="#2C55E8" text-anchor="middle" font-weight="700">R$41k</text>
  </g>

  <!-- Recent tasks -->
  <rect x="498" y="202" width="186" height="170" rx="6" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="510" y="220" font-size="9" fill="rgba(255,255,255,0.3)" font-weight="600" letter-spacing="1">TAREFAS DO DIA</text>

  <!-- Task items -->
  <g transform="translate(510, 232)">
    <!-- done -->
    <rect x="0" y="0" width="12" height="12" rx="2" fill="#2C55E8"/>
    <path d="M2 6l3 3 5-5" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
    <text x="18" y="10" font-size="10" fill="rgba(255,255,255,0.3)" text-decoration="line-through">Contrato Empresa X</text>

    <!-- done -->
    <rect x="0" y="22" width="12" height="12" rx="2" fill="#2C55E8"/>
    <path d="M2 28l3 3 5-5" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
    <text x="18" y="32" font-size="10" fill="rgba(255,255,255,0.3)" text-decoration="line-through">Proposta Dr. Marcos</text>

    <!-- urgent -->
    <rect x="0" y="44" width="12" height="12" rx="2" fill="none" stroke="rgba(246,200,95,0.5)" stroke-width="1"/>
    <text x="18" y="54" font-size="10" fill="#f6c85f">OS #312 — fiscal</text>
    <text x="150" y="54" font-size="8" fill="#f6c85f" font-weight="600">urgente</text>

    <!-- pending -->
    <rect x="0" y="66" width="12" height="12" rx="2" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <text x="18" y="76" font-size="10" fill="rgba(255,255,255,0.5)">Reunião João Silva</text>
  </g>

  <!-- All clear badge -->
  <rect x="498" y="338" width="186" height="34" rx="0"/>
  <rect x="510" y="344" width="162" height="22" rx="4" fill="rgba(44,85,232,0.08)" stroke="rgba(44,85,232,0.15)" stroke-width="1"/>
  <text x="521" y="358" font-size="9" fill="#2C55E8" font-weight="600">Visibilidade total · Equipe alinhada</text>

  <!-- OS List -->
  <rect x="168" y="388" width="516" height="106" rx="6" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="180" y="406" font-size="9" fill="rgba(255,255,255,0.3)" font-weight="600" letter-spacing="1">ORDENS DE SERVIÇO — ABERTAS</text>

  <!-- OS rows -->
  <line x1="168" y1="414" x2="684" y2="414" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Header -->
  <text x="184" y="428" font-size="8" fill="rgba(255,255,255,0.2)" font-weight="600">ID</text>
  <text x="224" y="428" font-size="8" fill="rgba(255,255,255,0.2)" font-weight="600">CLIENTE</text>
  <text x="400" y="428" font-size="8" fill="rgba(255,255,255,0.2)" font-weight="600">PRAZO</text>
  <text x="480" y="428" font-size="8" fill="rgba(255,255,255,0.2)" font-weight="600">RESPONSÁVEL</text>
  <text x="620" y="428" font-size="8" fill="rgba(255,255,255,0.2)" font-weight="600">STATUS</text>
  <line x1="168" y1="433" x2="684" y2="433" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Row 1 -->
  <text x="184" y="449" font-size="10" fill="rgba(255,255,255,0.3)" font-family="monospace">#312</text>
  <text x="224" y="449" font-size="10" fill="rgba(255,255,255,0.7)">Empresa Alfa</text>
  <text x="400" y="449" font-size="10" fill="#f6c85f">Hoje, 18h</text>
  <text x="480" y="449" font-size="10" fill="rgba(255,255,255,0.5)">Carlos</text>
  <rect x="614" y="438" width="62" height="16" rx="3" fill="rgba(246,200,95,0.1)" stroke="rgba(246,200,95,0.2)" stroke-width="1"/>
  <text x="645" y="449" font-size="8" fill="#f6c85f" text-anchor="middle" font-weight="600">Em análise</text>

  <!-- Row 2 -->
  <text x="184" y="469" font-size="10" fill="rgba(255,255,255,0.3)" font-family="monospace">#310</text>
  <text x="224" y="469" font-size="10" fill="rgba(255,255,255,0.7)">João F. Silva</text>
  <text x="400" y="469" font-size="10" fill="rgba(255,255,255,0.4)">22 Mai</text>
  <text x="480" y="469" font-size="10" fill="rgba(255,255,255,0.5)">Ana</text>
  <rect x="614" y="458" width="62" height="16" rx="3" fill="rgba(44,85,232,0.1)" stroke="rgba(44,85,232,0.2)" stroke-width="1"/>
  <text x="645" y="469" font-size="8" fill="#2C55E8" text-anchor="middle" font-weight="600">Documentação</text>

  <!-- Row 3 -->
  <text x="184" y="489" font-size="10" fill="rgba(255,255,255,0.3)" font-family="monospace">#308</text>
  <text x="224" y="489" font-size="10" fill="rgba(255,255,255,0.5)">R. Fernanda</text>
  <text x="400" y="489" font-size="10" fill="rgba(255,255,255,0.3)">18 Mai</text>
  <text x="480" y="489" font-size="10" fill="rgba(255,255,255,0.3)">—</text>
  <rect x="614" y="478" width="62" height="16" rx="3" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="645" y="489" font-size="8" fill="rgba(255,255,255,0.3)" text-anchor="middle">Concluída</text>

  <!-- Accent line bottom -->
  <rect x="20" y="516" width="680" height="3" rx="0" fill="rgba(44,85,232,0.3)"/>
  <rect x="20" y="516" width="240" height="3" fill="#2C55E8" rx="0"/>
</svg>
